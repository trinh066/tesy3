<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang web c bé nha</title>

<style>
*{
    box-sizing: border-box;
}

body{
    margin:0;
    font-family: Arial, sans-serif;
    background-image:url("https://i.postimg.cc/jdFm7Ygt/anhdep.jpg");
    background-size:cover;
    background-repeat:no-repeat;
    background-attachment:fixed;
    background-position:center;
    text-align:center;
    min-height:100vh;
}

h1{
    color:#ff4da6;
    margin-top:40px;
    text-shadow:1px 1px 3px white;
}

p{
    color:#ff69b4;
    font-size:22px;
    text-shadow:1px 1px 3px white;
}

/* nút bấm */
button{
    padding:12px 22px;
    font-size:16px;
    background:#eb6f5f;
    color:white;
    border:none;
    border-radius:20px;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    cursor:pointer;
    z-index:999;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* khu vực ảnh */
#gallery{
    width:95%;
    margin:120px auto 40px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
}

/* ảnh không méo */
#gallery img{
    width:18%;
    aspect-ratio:1 / 1;
    object-fit:cover;
    border-radius:10px;
    pointer-events:none;
    box-shadow:0 3px 8px rgba(0,0,0,0.3);
}

@media(max-width:768px){
    #gallery img{
        width:30%;
    }
}

@media(max-width:480px){
    #gallery img{
        width:45%;
    }
}
</style>
</head>

<body>

<p>bé thương c nhìu ạ ❤️</p>

let i = 0;

function themAnh(){
    let img = document.createElement("img");
    img.src = danhSachAnh[i].trim();
    img.alt = "ảnh yêu thương";

    document.getElementById("gallery").appendChild(img);

    i++;

    if(i >= danhSachAnh.length){
        i = 0;
    }
}

/* kéo nút bằng chuột */
let btn = document.getElementById("btn");
let isDragging = false;

btn.addEventListener("mousedown", function(e){
    isDragging = true;
});

document.addEventListener("mouseup", function(){
    isDragging = false;
});

document.addEventListener("mousemove", function(e){
    if(isDragging){
        btn.style.left = e.clientX + "px";
        btn.style.top = e.clientY + "px";
    }
});

/* kéo nút bằng điện thoại */
btn.addEventListener("touchmove", function(e){
    let touch = e.touches[0];

    btn.style.left = touch.clientX + "px";
    btn.style.top = touch.clientY + "px";

    e.preventDefault();
});
