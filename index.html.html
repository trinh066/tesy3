<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>trang web c bé nha</title>

<style>

body{
    font-family: Arial;
    background-image:url(https://i.postimg.cc/jdFm7Ygt/anhdep.jpg);
    background-size:cover;
    background-repeat:no-repeat;
    background-attachment:fixed;
    background-position:center;
    text-align:center;
}

h1{
color:#ff4da6;
}

p{
color:#ff69b4;
font-size:22px;
}

/* nút lơ lửng */
button{
    padding:10px 20px;
    font-size:15px;
    background:#eb6f5f;
    color:white;
    border:none;
    border-radius:5px;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    cursor:pointer;
}

/* khu vực chứa ảnh */
#gallery{
    margin-top:100px;
    display:flex;
    flex-wrap:wrap;
}

/* mỗi ảnh = 1/20 web */
#gallery img{
    width:20%;
    height:auto;
}

</style>
</head>

<body>

<h1>nay c bé mệt lắm đúng hum 🥺</h1>
<p>bé thương c nhìu ạ ❤️</p>

<button onclick="themAnh()">bấm vô nha c iu</button>

<div id="gallery"></div>

<script>

/* danh sách ảnh */
let danhSachAnh = [
"https://i.postimg.cc/JzWgwdQk/20260412-105748.jpg",

];

let i = 0;

/* bấm nút thêm ảnh theo thứ tự */
function themAnh(){

let img = document.createElement("img");

img.src = danhSachAnh[i];

document.getElementById("gallery").appendChild(img);

i++;

if(i >= danhSachAnh.length){
i = 0;
}

}

/* kéo nút */
let btn = document.querySelector("button");

let isDragging = false;

btn.addEventListener("mousedown", function(){
isDragging = true;
});

document.addEventListener("mouseup", function(){
isDragging = false;
});

document.addEventListener("mousemove", function(e){

if(isDragging){

btn.style.left = e.clientX + "px";
btn.style.top = e.clientY + "px";
btn.style.transform = "translate(-50%,-50%)";

}

});

</script>
