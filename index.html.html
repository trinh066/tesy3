<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>trang web c bé nha</title>

<style>

body{
    font-family: Arial;
    background-image:url(https://i.postimg.cc/jdFm7Ygt/anhdep.jpg);
    background-size: cover;
    background-repeat:no-repeat;
    background-attachment: fixed;
    background-position:center;
    text-align:center;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#eb6f5f;
    color:white;
    border:none;
    border-radius:5px;
    margin-bottom:20px;
}

/* khu vực chứa ảnh */
#gallery{
    display:flex;
    flex-wrap:wrap;
}

/* mỗi ảnh = 1/20 web */
#gallery img{
    width:5%;
}

</style>
</head>

<body>

<h1>nay c bé mệt lắm đúng hum 🥺</h1>
<p>bé thương c nhìu ạ ❤️</p>

<button onclick="themAnh()">bấm vô nha c iu</button>

<div id="gallery"></div>

<script>
    let danhSachAnh = [
"https://i.postimg.cc/xjtMgfVB/z5856344386475-b1999b349cc3fc293d90cb0e46743706.jpg",
"https://i.postimg.cc/jdFm7Ygt/anhdep.jpg"
];

function themAnh(){

    let img = document.createElement("img");

    img.src = "https://i.postimg.cc/jdFm7Ygt/anhdep.jpg";

    document.getElementById("gallery").appendChild(img);

}

</script>

</body>
</html>
