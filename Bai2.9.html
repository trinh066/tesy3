<html lang="vi"><head>
    <meta charset="utf-8">
    <title>Bai2.9</title>
    <style type="text/css">
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 90%;
            max-width: 1000px;
            margin: 0 auto;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .top {
            width: 100%;
            height: 100px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .top img {
            width: 70px;
            height: 70px;
            position: absolute;
            left: 20px;
        }
        h1 {
            font-family: 'Comic Sans MS', cursive;
            color: #0000ff;
            font-size: 32px;
        }
        .menu {
            width: 100%;
            background-color: #336699; 
            padding: 10px 20px;
        }
        .menu ul {
            list-style: none;
            display: flex;
        }
        .menu li {
            margin-right: 30px;
        }
        .menu a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        .container {
            width: 100%;
            display: flex;
            background-color: white;
            padding: 30px 20px;
            min-height: 400px;
        }
        .form-section {
            flex: 7; 
            padding-right: 40px;
        }
        .row {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }
        .row label {
            width: 150px;
            font-size: 14px;
        }
        .row input[type="text"], 
        .row input[type="tel"], 
        .row select, 
        .row textarea {
            flex: 1;
            padding: 6px;
            border: 1px solid #ccc;
        }
        .red { color: red; }
        .buttons {
            margin-left: 150px;
            margin-top: 10px;
        }
        .btn-submit { background-color: #008000; color: white; border: none; padding: 8px 15px; cursor: pointer; }
        .btn-reset { background-color: #0000ff; color: white; border: none; padding: 8px 15px; cursor: pointer; }
        .right-sidebar {
            flex: 3; 
            border-left: 1px solid #eee;
            padding-left: 20px;
        }
        .right-sidebar ul { list-style: none; }
        .right-sidebar li { margin-bottom: 12px; }
        .right-sidebar a {
            text-decoration: none;
            color: black;
            font-size: 14px;
        }
        .right-sidebar a:hover { color: blue; }
        .bottom {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            color: blue;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="top">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2reUh8lexPjnN0dLnydlOleFgHsHXuFywfA&s">
        <h1>TIN TỨC 24H</h1>
    </div>
    <div class="menu">
        <ul>
            <li><a href="#">Chính trị</a></li>
            <li><a href="#">Xã hội</a></li>
            <li><a href="#">Sức khỏe</a></li>
            <li><a href="#">Giáo dục</a></li>
            <li><a href="#">Thể thao</a></li>
            <li><a href="#">Liên hệ</a></li>
        </ul>
    </div>
    <div class="container">
        <div class="form-section">
            <form>
                <div class="row">
                    <label>Họ tên: <span class="red">*</span></label>
                    <input type="text" placeholder="Họ tên">
                </div>
                <div class="row">
                    <label>Địa chỉ:</label>
                    <input type="text" placeholder="Địa chỉ">
                </div>
                <div class="row">
                    <label>Số điện thoại: <span class="red">*</span></label>
                    <input type="tel" placeholder="Số điện thoại">
                </div>
                <div class="row">
                    <label>Giới tính:</label>
                    <input type="radio" name="gt" id="nam"> <label for="nam" style="width:auto; margin:0 10px 0 5px;">Nam</label>
                    <input type="radio" name="gt" id="nu"> <label for="nu" style="width:auto; margin-left:5px;">Nữ</label>
                </div>
                <div class="row">
                    <label>Năm sinh:</label>
                    <select>
                        <option>2003</option>
                        <option>2004</option>
                        <option>2005</option>
                    </select>
                </div>
                <div class="row">
                    <label>Nội dung liên hệ: <span class="red">*</span></label>
                    <textarea rows="5"></textarea>
                </div>
                <div class="buttons">
                    <input type="submit" class="btn-submit" value="Gửi thông tin góp ý">
                    <input type="reset" class="btn-reset" value="Nhập lại">
                </div>
            </form>
        </div>
        <div class="right-sidebar">
            <ul>
                <li><a href="#">Tin tức thị trường</a></li>
                <li><a href="#">Tin tức trong ngày</a></li>
                <li><a href="#">Thông tin chứng khoán</a></li>
                <li><a href="#">Sức khỏe đời sống</a></li>
                <li><a href="#">Công nghệ thông tin</a></li>
            </ul>
        </div>
    </div>
    <div class="bottom">
        <p>Cơ quan chủ quản: Công ty Cổ phần Quảng cáo Trực tuyến 24H</p>
        <p><i>© 24h.com</i></p>
    </div>
</body></html>
